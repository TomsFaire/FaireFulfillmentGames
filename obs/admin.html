<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FFG Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --kraft:#c9a574; --kraft-deep:#6b4a22; --ink:#2b2622; --cream:#fbf8f6;
    --paper:#f4ead6; --red:#a8442c; --green:#2d6a2d; --amber:#7a5f00;
    --mono: ui-monospace,'SF Mono',Menlo,monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter',sans-serif; background:#1a1816; color:var(--cream);
    min-height:100dvh; padding:16px; display:flex; flex-direction:column; gap:14px;
  }

  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-family:'Lora',serif; font-style:italic; font-weight:500;
               font-size:22px; color:var(--kraft); }
  .status-pill { font-size:10px; font-weight:700; letter-spacing:.12em;
                 padding:4px 10px; border-radius:20px; }
  .status-pill.live    { background:#1a3a1a; color:#6ecf6e; }
  .status-pill.local   { background:#3a2e00; color:#e0b840; }
  .status-pill.offline { background:#3a1a1a; color:#cf6e6e; }

  /* Section card */
  .section {
    background:#2b2622; border-radius:8px; padding:14px 16px;
    display:flex; flex-direction:column; gap:10px;
  }
  .section-label {
    font-size:10px; letter-spacing:.2em; color:var(--kraft); font-weight:700;
  }

  /* Team row */
  .team-row {
    display:grid; grid-template-columns:auto 1fr 1fr 1fr 1fr; gap:8px;
    align-items:center;
  }
  .team-row .idx {
    width:24px; text-align:center;
    font-size:11px; font-family:var(--mono); color:var(--kraft); opacity:.7;
  }
  .team-row input {
    padding:8px 10px; border:1px solid var(--kraft-deep);
    border-radius:4px; background:#1a1816; color:var(--cream);
    font-family:'Inter',sans-serif; font-size:13px;
    width:100%;
  }
  .team-row input:focus { outline:none; border-color:var(--kraft); }
  .team-row .field-hint {
    font-size:9px; letter-spacing:.08em; color:var(--kraft); opacity:.5;
    margin-top:2px;
  }
  .field-wrap { display:flex; flex-direction:column; }

  /* H2H slot */
  .h2h-row {
    display:flex; align-items:center; gap:10px;
  }
  .h2h-row .slot-lbl {
    font-size:11px; font-family:var(--mono); color:var(--kraft);
    width:56px; flex-shrink:0;
  }
  .h2h-row select {
    flex:1; padding:8px 10px; border:1px solid var(--kraft-deep);
    border-radius:4px; background:#1a1816; color:var(--cream);
    font-family:'Inter',sans-serif; font-size:13px;
    appearance:none;
  }
  .h2h-row select:focus { outline:none; border-color:var(--kraft); }
  .h2h-row .vs {
    font-size:11px; letter-spacing:.12em; color:var(--kraft); opacity:.5;
    padding:0 4px;
  }

  /* URL guide */
  .url-table { width:100%; border-collapse:collapse; font-size:12px; }
  .url-table th {
    text-align:left; font-size:9px; letter-spacing:.18em; color:var(--kraft);
    font-weight:700; padding:4px 6px; border-bottom:1px solid rgba(201,165,116,0.2);
  }
  .url-table td {
    padding:5px 6px; border-bottom:1px solid rgba(201,165,116,0.08);
    vertical-align:middle;
  }
  .url-table tr:last-child td { border-bottom:none; }
  .url-table .url-cell {
    font-family:var(--mono); font-size:11px; color:var(--kraft);
    word-break:break-all;
  }
  .url-table .lbl-cell { color:var(--cream); opacity:.7; }
  .url-table a { color:var(--kraft); text-decoration:none; }
  .url-table a:hover { text-decoration:underline; }

  /* Save button */
  .btn-save {
    background:var(--green); color:#fff; border:none; border-radius:6px;
    padding:12px 24px; font-family:var(--mono); font-size:12px;
    letter-spacing:.2em; font-weight:700; cursor:pointer;
    touch-action:manipulation; align-self:flex-start;
  }
  .btn-save:active { opacity:.75; }
  .save-msg { font-size:11px; opacity:.55; min-height:16px; }

  @media (max-width: 600px) {
    .team-row { grid-template-columns:auto 1fr; }
    .team-row .field-wrap:nth-child(n+4) { display:none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>FFG Admin</h1>
  <div class="status-pill offline" id="status-pill">OFFLINE</div>
</div>

<!-- Team name editor -->
<div class="section">
  <div class="section-label">TEAMS</div>
  <div class="team-row" style="margin-bottom:-2px;">
    <div class="idx"></div>
    <div style="font-size:9px;letter-spacing:.16em;color:var(--kraft);opacity:.5;">NAME</div>
    <div style="font-size:9px;letter-spacing:.16em;color:var(--kraft);opacity:.5;">CITY / LOCATION</div>
    <div style="font-size:9px;letter-spacing:.16em;color:var(--kraft);opacity:.5;">CODE (SHORT)</div>
    <div style="font-size:9px;letter-spacing:.16em;color:var(--kraft);opacity:.5;">PRESENTER / USER</div>
  </div>
  <div id="team-rows"></div>
  <button class="btn-save" id="btn-save-teams">SAVE TEAMS</button>
  <div class="save-msg" id="teams-msg"></div>
</div>

<!-- H2H slot assignments -->
<div class="section">
  <div class="section-label">HEAD-TO-HEAD MATCHUPS</div>
  <p style="font-size:12px;opacity:.55;line-height:1.5;">
    Each H2H overlay page has a slot (<code style="font-size:11px;color:var(--kraft);">?slot=a</code> or <code style="font-size:11px;color:var(--kraft);">?slot=b</code>).
    Set which teams face off in each slot here.
  </p>
  <div id="h2h-rows"></div>
  <button class="btn-save" id="btn-save-h2h">SAVE MATCHUPS</button>
  <div class="save-msg" id="h2h-msg"></div>
</div>

<!-- OBS URL guide -->
<div class="section">
  <div class="section-label">OBS BROWSER SOURCE URLS</div>
  <table class="url-table">
    <thead>
      <tr><th>OVERLAY</th><th>URL</th></tr>
    </thead>
    <tbody id="url-tbody"></tbody>
  </table>
</div>

<script>
  const BASE = location.protocol !== 'file:' ? '' : 'http://localhost:3000';
  const IS_SERVED = location.protocol !== 'file:';

  // ── State ──────────────────────────────────────────────────────
  let teams = [
    { name:'Team 1', city:'CITY 1', code:'T1', user:'' },
    { name:'Team 2', city:'CITY 2', code:'T2', user:'' },
    { name:'Team 3', city:'CITY 3', code:'T3', user:'' },
    { name:'Team 4', city:'CITY 4', code:'T4', user:'' },
  ];
  let h2h = { a:{ left:0, right:1 }, b:{ left:2, right:3 } };

  // Try loading from localStorage first (works offline too)
  try {
    const st = JSON.parse(localStorage.getItem('ffg.teams') || 'null');
    if (Array.isArray(st) && st.length === 4) teams = st;
  } catch (_) {}
  try {
    const sh = JSON.parse(localStorage.getItem('ffg.h2h') || 'null');
    if (sh && sh.a && sh.b) h2h = sh;
  } catch (_) {}

  // ── Status pill ────────────────────────────────────────────────
  function updateStatus(ok) {
    const pill = document.getElementById('status-pill');
    if (!IS_SERVED) { pill.className = 'status-pill local'; pill.textContent = 'LOCAL'; return; }
    if (ok)  { pill.className = 'status-pill live';    pill.textContent = 'LIVE'; }
    else     { pill.className = 'status-pill offline'; pill.textContent = 'OFFLINE'; }
  }

  // ── Build team rows ────────────────────────────────────────────
  const teamRowsEl = document.getElementById('team-rows');
  teamRowsEl.style.cssText = 'display:flex;flex-direction:column;gap:6px;';

  function buildTeamRows() {
    teamRowsEl.innerHTML = '';
    teams.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'team-row';
      row.innerHTML = `
        <div class="idx">${i + 1}</div>
        <div class="field-wrap">
          <input type="text" id="t${i}-name" value="${esc(t.name)}" placeholder="Team ${i+1}" maxlength="64" />
        </div>
        <div class="field-wrap">
          <input type="text" id="t${i}-city" value="${esc(t.city)}" placeholder="CITY" maxlength="64" />
        </div>
        <div class="field-wrap">
          <input type="text" id="t${i}-code" value="${esc(t.code)}" placeholder="T${i+1}" maxlength="8" />
        </div>
        <div class="field-wrap">
          <input type="text" id="t${i}-user" value="${esc(t.user)}" placeholder="presenter" maxlength="64" />
        </div>`;
      teamRowsEl.appendChild(row);
    });
  }
  buildTeamRows();

  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  function readTeams() {
    return [0,1,2,3].map(i => ({
      name: document.getElementById('t'+i+'-name').value.trim(),
      city: document.getElementById('t'+i+'-city').value.trim(),
      code: document.getElementById('t'+i+'-code').value.trim(),
      user: document.getElementById('t'+i+'-user').value.trim(),
    }));
  }

  // ── Build H2H rows ─────────────────────────────────────────────
  const h2hRowsEl = document.getElementById('h2h-rows');
  h2hRowsEl.style.cssText = 'display:flex;flex-direction:column;gap:8px;';

  function teamOptions(selectedIdx) {
    return teams.map((t, i) =>
      `<option value="${i}" ${i === selectedIdx ? 'selected' : ''}>${i+1} · ${esc(t.name)}</option>`
    ).join('');
  }

  function buildH2HRows() {
    h2hRowsEl.innerHTML = '';
    ['a', 'b'].forEach(slot => {
      const cfg = h2h[slot] || { left:0, right:1 };
      const row = document.createElement('div');
      row.className = 'h2h-row';
      row.innerHTML = `
        <div class="slot-lbl">SLOT ${slot.toUpperCase()}</div>
        <select id="h2h-${slot}-left">${teamOptions(cfg.left)}</select>
        <div class="vs">VS</div>
        <select id="h2h-${slot}-right">${teamOptions(cfg.right)}</select>`;
      h2hRowsEl.appendChild(row);
    });
  }
  buildH2HRows();

  function readH2H() {
    return {
      a: {
        left:  +document.getElementById('h2h-a-left').value,
        right: +document.getElementById('h2h-a-right').value,
      },
      b: {
        left:  +document.getElementById('h2h-b-left').value,
        right: +document.getElementById('h2h-b-right').value,
      },
    };
  }

  // ── Save teams ─────────────────────────────────────────────────
  document.getElementById('btn-save-teams').addEventListener('click', () => {
    const newTeams = readTeams();
    teams = newTeams;
    localStorage.setItem('ffg.teams', JSON.stringify(teams));
    const msg = document.getElementById('teams-msg');

    // Rebuild H2H dropdowns with new names
    buildH2HRows();

    // Broadcast locally (same-machine overlays)
    try {
      const bc = new BroadcastChannel('ffg-orders');
      bc.postMessage({ type: 'ffg.teams', teams });
      setTimeout(() => bc.close(), 500);
    } catch (_) {}

    if (IS_SERVED) {
      fetch('/api/teams', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ teams }),
      })
        .then(r => r.json())
        .then(d => {
          updateStatus(true);
          msg.textContent = d.ok ? 'Saved ✓' : ('Error: ' + (d.error || 'unknown'));
          buildUrlTable();
        })
        .catch(err => { updateStatus(false); msg.textContent = 'Error: ' + err.message; });
    } else {
      msg.textContent = 'Saved locally ✓ (server not running — overlays on same machine will reload)';
    }
    setTimeout(() => { msg.textContent = ''; }, 4000);
    buildUrlTable();
  });

  // ── Save H2H ───────────────────────────────────────────────────
  document.getElementById('btn-save-h2h').addEventListener('click', () => {
    const newH2h = readH2H();
    h2h = newH2h;
    localStorage.setItem('ffg.h2h', JSON.stringify(h2h));
    const msg = document.getElementById('h2h-msg');

    // Broadcast locally
    try {
      const bc = new BroadcastChannel('ffg-orders');
      bc.postMessage({ type: 'ffg.h2h', h2h });
      setTimeout(() => bc.close(), 500);
    } catch (_) {}

    if (IS_SERVED) {
      fetch('/api/h2h', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ h2h }),
      })
        .then(r => r.json())
        .then(d => {
          updateStatus(true);
          msg.textContent = d.ok ? 'Saved ✓' : ('Error: ' + (d.error || 'unknown'));
        })
        .catch(err => { updateStatus(false); msg.textContent = 'Error: ' + err.message; });
    } else {
      msg.textContent = 'Saved locally ✓ (overlays on same machine will reload)';
    }
    setTimeout(() => { msg.textContent = ''; }, 4000);
    buildUrlTable();
  });

  // ── URL guide table ────────────────────────────────────────────
  function buildUrlTable() {
    const tbody = document.getElementById('url-tbody');
    const base  = IS_SERVED ? (location.origin) : 'http://localhost:3000';
    const rows  = [
      { label: 'Four-Up Grid',            url: base + '/overlay-3-four-up.html?obs=1' },
      { label: 'H2H — Slot A (' + teams[h2h.a.left].name + ' vs ' + teams[h2h.a.right].name + ')', url: base + '/overlay-4-head-to-head.html?slot=a&obs=1' },
      { label: 'H2H — Slot B (' + teams[h2h.b.left].name + ' vs ' + teams[h2h.b.right].name + ')', url: base + '/overlay-4-head-to-head.html?slot=b&obs=1' },
      { label: 'Wide + PiP — ' + teams[0].name, url: base + '/overlay-1-single-pip.html?team=0&obs=1' },
      { label: 'Wide + PiP — ' + teams[1].name, url: base + '/overlay-1-single-pip.html?team=1&obs=1' },
      { label: 'Wide + PiP — ' + teams[2].name, url: base + '/overlay-1-single-pip.html?team=2&obs=1' },
      { label: 'Wide + PiP — ' + teams[3].name, url: base + '/overlay-1-single-pip.html?team=3&obs=1' },
      { label: 'Wide Only — ' + teams[0].name,  url: base + '/overlay-1-wide-only.html?team=0&obs=1' },
      { label: 'Wide Only — ' + teams[1].name,  url: base + '/overlay-1-wide-only.html?team=1&obs=1' },
      { label: 'Wide Only — ' + teams[2].name,  url: base + '/overlay-1-wide-only.html?team=2&obs=1' },
      { label: 'Wide Only — ' + teams[3].name,  url: base + '/overlay-1-wide-only.html?team=3&obs=1' },
      { label: 'Champion — ' + teams[0].name,   url: base + '/overlay-5-champion.html?winner=0' },
      { label: 'Champion — ' + teams[1].name,   url: base + '/overlay-5-champion.html?winner=1' },
      { label: 'Champion — ' + teams[2].name,   url: base + '/overlay-5-champion.html?winner=2' },
      { label: 'Champion — ' + teams[3].name,   url: base + '/overlay-5-champion.html?winner=3' },
    ];
    tbody.innerHTML = rows.map(r =>
      `<tr>
        <td class="lbl-cell">${esc(r.label)}</td>
        <td class="url-cell"><a href="${esc(r.url)}" target="_blank">${esc(r.url)}</a></td>
      </tr>`
    ).join('');
  }
  buildUrlTable();

  // ── Init from server ───────────────────────────────────────────
  if (IS_SERVED) {
    fetch('/api/teams')
      .then(r => r.json())
      .then(d => {
        updateStatus(true);
        if (Array.isArray(d.teams) && d.teams.length === 4) {
          teams = d.teams;
          buildTeamRows();
        }
        if (d.h2h && d.h2h.a && d.h2h.b) {
          h2h = d.h2h;
          buildH2HRows();
        }
        buildUrlTable();
      })
      .catch(() => updateStatus(false));
  } else {
    updateStatus(false);
  }
</script>
</body>
</html>
