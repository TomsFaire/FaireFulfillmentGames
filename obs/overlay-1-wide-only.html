<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FFG Overlay 1b — Wide Cam Only</title>
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="cardboard.css" />
</head>
<body>
  <div class="stage" id="stage" data-screen-label="Overlay 1b — Wide Cam Only"></div>

  <script src="overlay-kit.js"></script>
  <script src="stagetimer.js"></script>
  <script>
    (function () {
      const { el, makeFrame, makeTitleBanner, makeTimerChip, autoScale, applyObsMode } = window.OverlayKit;
      const stage = document.getElementById('stage');

      // Title banner — top
      const tb = makeTitleBanner();
      Object.assign(tb.style, { position: 'absolute', top: '28px', left: '80px', right: '80px' });
      const stamp = tb.querySelector('.stamp');
      if (stamp) {
        const chip = makeTimerChip('SHIP-BY');
        chip.style.transform = 'rotate(0)';
        stamp.replaceWith(chip);
        Stagetimer.bind(chip);
        Stagetimer.initFromServer();
      }
      stage.appendChild(tb);

      // Wide cam frame — full height, no PiP
      const wideWrap = el('div', { style: { position: 'absolute', top: '140px', left: '80px' } });
      wideWrap.appendChild(makeFrame({
        width: 1760, height: 860,
        top: 48, side: 48, bottom: 140,
        title: 'THE PACKING STATION',
        sub: 'STATION · WIDE CAM',
        tape: 'tr',
        corner: 'WIDE / 16:9',
        resW: 1664, resH: 672,
        resLabel: 'WIDE CAM',
        placeholderLabel: 'WIDE CAMERA FEED',
      }));
      stage.appendChild(wideWrap);

      applyObsMode();
      autoScale();
    })();
  </script>
</body>
</html>
